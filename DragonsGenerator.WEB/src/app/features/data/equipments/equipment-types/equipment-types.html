<div class="w-full min-h-screen bg-[#171b22] flex flex-col animate-fade-in select-none pb-20">
  <section class="w-full py-16 px-4 max-w-6xl mx-auto flex flex-col items-center">
    <div class="w-full max-w-5xl mb-8">
      <a
        routerLink="/equipments"
        class="inline-flex items-center gap-2 text-xs font-black uppercase tracking-widest text-slate-500 hover:text-amber-500 transition-colors group"
      >
        <span class="group-hover:-translate-x-1 transition-transform">←</span> Retour à l'Arsenal
      </a>
    </div>

    <div class="flex items-center gap-6 mb-12 w-full max-w-3xl">
      <div class="h-px flex-grow bg-gradient-to-r from-transparent to-slate-700"></div>
      <h1
        class="text-3xl md:text-4xl font-bold text-slate-200 font-serif tracking-widest uppercase drop-shadow-md text-center"
      >
        Catégories <span class="text-amber-500">Marchandes</span>
      </h1>
      <div class="h-px flex-grow bg-gradient-to-l from-transparent to-slate-700"></div>
    </div>

    @if (loading()) {
      <div class="flex flex-col items-center justify-center py-20 animate-pulse text-amber-500">
        <span class="text-6xl mb-4"
          ><iconify-icon icon="fluent-emoji:file-folder"></iconify-icon
        ></span>
        <p class="text-lg font-serif tracking-widest uppercase text-slate-400">
          Inventaire des étals en cours...
        </p>
      </div>
    } @else {
      <div
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 w-full max-w-5xl"
      >
        @for (t of types(); track t) {
          <a
            [routerLink]="['/equipments/type', t.toLowerCase()]"
            class="bg-[#1b2028] p-8 rounded-3xl border border-slate-800 shadow-xl group hover:border-amber-500/50 hover:bg-[#1f242e] transition-all duration-300 hover:-translate-y-2 flex flex-col items-center text-center relative overflow-hidden"
          >
            <div
              class="absolute -top-4 -right-4 text-7xl opacity-5 pointer-events-none group-hover:scale-110 transition-transform duration-500"
            >
              <iconify-icon [icon]="getTypeIcon(t)"></iconify-icon>
            </div>

            <span
              class="text-5xl mb-4 drop-shadow-[0_0_15px_rgba(245,158,11,0.2)] group-hover:scale-110 transition-transform origin-bottom relative z-10"
            >
              <iconify-icon [icon]="getTypeIcon(t)"></iconify-icon>
            </span>
            <h2
              class="text-lg font-bold text-slate-300 font-serif tracking-widest uppercase group-hover:text-amber-400 transition-colors relative z-10"
            >
              {{ translateType(t) }}
            </h2>
          </a>
        } @empty {
          <div class="col-span-full py-20 text-center">
            <p class="text-slate-500 italic">Aucune catégorie disponible.</p>
          </div>
        }
      </div>
    }
  </section>
</div>

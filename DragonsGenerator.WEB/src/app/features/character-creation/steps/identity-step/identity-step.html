<div
  class="relative w-full flex flex-col items-center animate-fade-in py-6 sm:py-10 select-none justify-center min-h-[65vh]"
>
  <div class="text-center mb-10 w-full px-4">
    <h2
      class="text-4xl font-extrabold text-amber-500 mb-4 drop-shadow-md tracking-wide font-serif flex items-center justify-center gap-3"
    >
      <iconify-icon icon="fluent-emoji:identification-card"></iconify-icon> Identité & Personnalité
    </h2>
    <div
      class="inline-flex items-center gap-3 px-6 py-2 bg-[#171b22] border border-slate-800 rounded-full shadow-lg"
    >
      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
      <span class="text-slate-300 text-xs font-black uppercase tracking-widest">
        {{ charSummary() }}
      </span>
      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
    </div>
  </div>

  <div class="w-full max-w-4xl px-4 flex flex-col gap-10 pb-8">
    <div class="bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label
            class="text-[10px] font-black uppercase tracking-widest text-slate-500 flex items-center gap-2"
          >
            <iconify-icon icon="fluent-emoji:writing-hand"></iconify-icon> Nom du Personnage
            <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [ngModel]="c().name"
            (ngModelChange)="updateField('name', $event)"
            placeholder="Ex: Kaelen, Lyra..."
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all"
          />
        </div>

        <div class="flex flex-col gap-2">
          <label
            class="text-[10px] font-black uppercase tracking-widest text-slate-500 flex items-center gap-2"
          >
            <iconify-icon icon="fluent-emoji:balance-scale"></iconify-icon> Alignement
          </label>
          <select
            [ngModel]="c().alignment"
            (ngModelChange)="updateField('alignment', $event)"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all appearance-none"
          >
            <option value="">-- Choisir un alignement --</option>
            @for (align of alignments; track align) {
              <option [value]="align">{{ align }}</option>
            }
          </select>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label
            class="text-[10px] font-black uppercase tracking-widest text-slate-500 flex items-center gap-2"
          >
            <iconify-icon icon="fluent-emoji:smiling-face-with-halo"></iconify-icon> Traits de
            personnalité
          </label>
          <textarea
            [ngModel]="c().traits"
            (ngModelChange)="updateField('traits', $event)"
            rows="2"
            placeholder="Je suis toujours poli et respectueux, même envers mes ennemis..."
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none custom-scrollbar"
          ></textarea>
        </div>

        <div class="flex flex-col gap-2">
          <label
            class="text-[10px] font-black uppercase tracking-widest text-slate-500 flex items-center gap-2"
          >
            <iconify-icon icon="fluent-emoji:glowing-star"></iconify-icon> Idéaux
          </label>
          <textarea
            [ngModel]="c().ideal"
            (ngModelChange)="updateField('ideal', $event)"
            rows="2"
            placeholder="La liberté avant tout..."
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none custom-scrollbar"
          ></textarea>
        </div>

        <div class="flex flex-col gap-2">
          <label
            class="text-[10px] font-black uppercase tracking-widest text-slate-500 flex items-center gap-2"
          >
            <iconify-icon icon="fluent-emoji:handshake"></iconify-icon> Liens
          </label>
          <textarea
            [ngModel]="c().bonds"
            (ngModelChange)="updateField('bonds', $event)"
            rows="2"
            placeholder="Je dois protéger mon village à tout prix..."
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none custom-scrollbar"
          ></textarea>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label
            class="text-[10px] font-black uppercase tracking-widest text-slate-500 flex items-center gap-2"
          >
            <iconify-icon icon="fluent-emoji:broken-heart"></iconify-icon> Défauts
          </label>
          <textarea
            [ngModel]="c().flaws"
            (ngModelChange)="updateField('flaws', $event)"
            rows="2"
            placeholder="Je ne résiste jamais à un pari, même si ma vie est en jeu..."
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none custom-scrollbar"
          ></textarea>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2 mt-4 pt-6 border-t border-slate-800">
          <div class="flex flex-wrap justify-between items-end mb-2 gap-4">
            <label
              class="text-[10px] font-black uppercase tracking-widest text-amber-500 flex items-center gap-2"
            >
              <iconify-icon icon="fluent-emoji:scroll"></iconify-icon> Histoire & Trame
            </label>
            <div class="flex flex-col items-end gap-1">
              <button
                (click)="generateStory()"
                [disabled]="isGenerating()"
                class="bg-fuchsia-950/40 text-fuchsia-400 border border-fuchsia-900/50 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-fuchsia-900/60 transition-all flex items-center gap-2 disabled:opacity-50"
              >
                @if (isGenerating()) {
                  <span
                    class="w-3 h-3 border-2 border-fuchsia-400 border-t-transparent rounded-full animate-spin"
                  ></span>
                  Création en cours...
                } @else {
                  <iconify-icon icon="fluent-emoji:sparkles"></iconify-icon> S'inspirer par l'IA
                }
              </button>
              @if (generationError()) {
                <p class="text-[9px] text-red-400 font-bold uppercase tracking-tighter mt-1">
                  {{ generationError() }}
                </p>
              }
            </div>
          </div>

          <textarea
            [ngModel]="c().story"
            (ngModelChange)="updateField('story', $event)"
            rows="8"
            placeholder="Racontez le passé de votre héros. D'où vient-il ? Pourquoi est-il parti à l'aventure ?"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-4 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none custom-scrollbar leading-relaxed"
          ></textarea>
        </div>
      </div>
    </div>

    <div class="mt-8 flex flex-col items-center gap-4 w-full">
      @if (!c().name.trim()) {
        <div
          class="px-6 py-2 bg-red-950/20 border border-red-900/50 rounded-full flex items-center gap-3"
        >
          <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
          <span class="text-[10px] font-black uppercase tracking-widest text-red-400/90"
            >Le nom est requis</span
          >
        </div>
      }

      <button
        class="px-14 py-4 rounded-xl text-sm font-black uppercase tracking-widest transition-all shadow-lg"
        [ngClass]="
          c().name.trim()
            ? 'bg-amber-500 text-slate-950 hover:bg-amber-400 hover:scale-105 shadow-[0_0_25px_rgba(245,158,11,0.3)]'
            : 'bg-slate-800 text-slate-500 opacity-50 cursor-not-allowed'
        "
        [disabled]="!c().name.trim()"
        (click)="confirm()"
      >
        Valider l'Identité
      </button>

      <button
        class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-amber-400 transition-colors bg-[#1b2028] px-6 py-2 rounded-full border border-slate-700 mt-2"
        (click)="prevStep()"
      >
        ← Étape précédente
      </button>
    </div>
  </div>
</div>

<div
  class="relative w-full flex flex-col items-center animate-fade-in py-6 sm:py-10 select-none justify-center min-h-[65vh]"
>
  <div class="text-center mb-10 w-full px-4">
    <h2 class="text-4xl font-extrabold text-amber-500 mb-4 drop-shadow-md tracking-wide font-serif">
      Identité & Personnalité
    </h2>
    <div
      class="inline-flex items-center gap-3 px-6 py-2 bg-[#171b22] border border-slate-800 rounded-full shadow-lg"
    >
      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
      <span class="text-slate-300 text-xs font-black uppercase tracking-widest">{{
        charSummary()
      }}</span>
      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
    </div>
  </div>

  <div class="w-full max-w-4xl px-4 flex flex-col gap-10 pb-8">
    <div class="bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col md:col-span-2">
          <label
            class="text-[10px] font-black uppercase tracking-[0.2em] text-amber-500/80 mb-2 ml-1"
            for="char-name"
          >
            Nom du Héros <span class="text-red-500">*</span>
          </label>
          <input
            id="char-name"
            type="text"
            class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-100 font-serif text-lg focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/50 transition-all shadow-[inset_0_0_15px_rgba(0,0,0,0.4)]"
            placeholder="Comment vous nomme-t-on ?"
            [ngModel]="c().name"
            (ngModelChange)="updateField('name', $event)"
          />
        </div>

        <div class="flex flex-col">
          <label
            class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2 ml-1"
            for="char-bg"
            >Historique</label
          >
          <input
            id="char-bg"
            type="text"
            class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 font-serif focus:outline-none focus:border-amber-500/60 shadow-[inset_0_0_10px_rgba(0,0,0,0.3)]"
            placeholder="Ex : Soldat, Ermite..."
            [ngModel]="c().background"
            (ngModelChange)="updateField('background', $event)"
          />
        </div>

        <div class="flex flex-col">
          <label
            class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2 ml-1"
            for="char-align"
            >Alignement</label
          >
          <div class="relative w-full">
            <select
              id="char-align"
              class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 font-serif appearance-none cursor-pointer focus:outline-none focus:border-amber-500/60"
              [ngModel]="c().alignment"
              (ngModelChange)="updateField('alignment', $event)"
            >
              <option value="">— Choisir —</option>
              @for (a of alignments; track a) {
                <option [value]="a">{{ a }}</option>
              }
            </select>
            <div
              class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500 text-[10px]"
            >
              ▼
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-6">
      <div class="flex items-center gap-6 mb-2 w-full">
        <div class="h-px flex-grow bg-gradient-to-r from-transparent to-emerald-900/50"></div>
        <h3 class="text-lg font-bold text-emerald-500 font-serif tracking-widest uppercase">
          L'Âme
        </h3>
        <div class="h-px flex-grow bg-gradient-to-l from-transparent to-emerald-900/50"></div>
      </div>

      <div
        class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl"
      >
        <div class="flex flex-col">
          <label
            class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-500/70 mb-2 ml-1"
            >Idéal</label
          >
          <textarea
            rows="2"
            class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 font-serif focus:outline-none focus:border-emerald-500/60 resize-none shadow-[inset_0_0_10px_rgba(0,0,0,0.3)]"
            placeholder="Vos convictions..."
            [ngModel]="c().ideal"
            (ngModelChange)="updateField('ideal', $event)"
          ></textarea>
        </div>
        <div class="flex flex-col">
          <label
            class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-500/70 mb-2 ml-1"
            >Traits</label
          >
          <textarea
            rows="2"
            class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 font-serif focus:outline-none focus:border-emerald-500/60 resize-none shadow-[inset_0_0_10px_rgba(0,0,0,0.3)]"
            placeholder="Votre tempérament..."
            [ngModel]="c().traits"
            (ngModelChange)="updateField('traits', $event)"
          ></textarea>
        </div>
        <div class="flex flex-col">
          <label
            class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-500/70 mb-2 ml-1"
            >Obligations (Bonds)</label
          >
          <textarea
            rows="2"
            class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 font-serif focus:outline-none focus:border-emerald-500/60 resize-none"
            placeholder="À quoi tenez-vous ?"
            [ngModel]="c().bonds"
            (ngModelChange)="updateField('bonds', $event)"
          ></textarea>
        </div>
        <div class="flex flex-col">
          <label
            class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-500/70 mb-2 ml-1"
            >Failles (Flaws)</label
          >
          <textarea
            rows="2"
            class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 font-serif focus:outline-none focus:border-emerald-500/60 resize-none"
            placeholder="Vos faiblesses..."
            [ngModel]="c().flaws"
            (ngModelChange)="updateField('flaws', $event)"
          ></textarea>
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-6">
      <div class="flex items-center gap-6 mb-2 w-full">
        <div class="h-px flex-grow bg-gradient-to-r from-transparent to-slate-800"></div>
        <h3 class="text-lg font-bold text-slate-500 font-serif tracking-widest uppercase">
          Apparence
        </h3>
        <div class="h-px flex-grow bg-gradient-to-l from-transparent to-slate-800"></div>
      </div>

      <div
        class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl"
      >
        <div class="flex flex-col">
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2 ml-1"
            >Description physique</label
          >
          <textarea
            rows="2"
            class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 font-serif focus:outline-none focus:border-slate-500 resize-none"
            placeholder="Taille, cicatrices, style..."
            [ngModel]="c().description"
            (ngModelChange)="updateField('description', $event)"
          ></textarea>
        </div>
        <div class="flex flex-col">
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2 ml-1"
            >Particularité / Handicap</label
          >
          <textarea
            rows="2"
            class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 font-serif focus:outline-none focus:border-slate-500 resize-none"
            placeholder="Un trait marquant ?"
            [ngModel]="c().handicap"
            (ngModelChange)="updateField('handicap', $event)"
          ></textarea>
        </div>
      </div>
    </div>

    <div class="bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl">
      <div class="flex justify-between items-end mb-2 ml-1">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-amber-500/80"
          >Livre de vie</label
        >
        <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest"
          >{{ c().story.length }} signes</span
        >
      </div>
      <textarea
        rows="6"
        class="w-full bg-[#171b22] border border-slate-700/50 rounded-xl px-5 py-4 text-slate-300 font-serif leading-relaxed focus:outline-none focus:border-amber-500 shadow-[inset_0_0_15px_rgba(0,0,0,0.4)] resize-y min-h-[150px]"
        placeholder="Rédigez votre histoire..."
        [ngModel]="c().story"
        (ngModelChange)="updateField('story', $event)"
      ></textarea>

      <div class="mt-4 flex flex-col gap-2">
        <button
          (click)="generateStory()"
          [disabled]="isGenerating()"
          class="group w-fit px-5 py-2.5 bg-indigo-900/20 text-indigo-400 border border-indigo-500/30 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-900/40 hover:text-indigo-200 transition-all flex items-center gap-3 disabled:opacity-50"
        >
          @if (isGenerating()) {
            <span
              class="w-3 h-3 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"
            ></span>
            Génération...
          } @else {
            <span class="text-sm group-hover:scale-110 transition-transform">✨</span> Inspirer par
            l'IA
          }
        </button>
        @if (generationError()) {
          <p class="text-[9px] text-red-400 font-bold uppercase tracking-tighter">
            {{ generationError() }}
          </p>
        }
      </div>
    </div>

    <div class="mt-8 flex flex-col items-center gap-4 w-full">
      @if (!c().name.trim()) {
        <div
          class="px-6 py-2 bg-red-950/20 border border-red-900/50 rounded-full flex items-center gap-3"
        >
          <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
          <span class="text-[10px] font-black uppercase tracking-widest text-red-400/90"
            >Le nom est requis</span
          >
        </div>
      }

      <button
        class="px-14 py-4 rounded-xl text-sm font-black uppercase tracking-widest transition-all"
        [ngClass]="
          c().name.trim()
            ? 'bg-amber-500 text-slate-950 hover:bg-amber-400 hover:scale-105 shadow-[0_0_25px_rgba(245,158,11,0.3)]'
            : 'bg-slate-800 text-slate-500 opacity-50 cursor-not-allowed'
        "
        [disabled]="!c().name.trim()"
        (click)="confirm()"
      >
        Valider l'identité
      </button>

      <button
        class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-amber-400 transition-colors px-6 py-2"
        (click)="prevStep()"
      >
        ← Revenir en arrière
      </button>
    </div>
  </div>
</div>

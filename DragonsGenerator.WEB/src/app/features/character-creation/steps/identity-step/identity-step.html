<div
  class="relative w-full flex flex-col items-center animate-fade-in py-6 sm:py-10 select-none justify-center min-h-[65vh]"
>
  <div class="text-center mb-10 w-full px-4">
    <h2
      class="text-4xl font-extrabold text-amber-500 mb-4 drop-shadow-md tracking-wide font-serif flex items-center justify-center gap-3"
    >
      <iconify-icon icon="fluent-emoji:identification-card"></iconify-icon> Identité & Personnalité
    </h2>
    <div
      class="inline-flex items-center gap-3 px-6 py-2 bg-[#171b22] border border-slate-800 rounded-full shadow-lg"
    >
      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
      <span class="text-slate-300 text-xs font-black uppercase tracking-widest">
        {{ charSummary() }}
      </span>
      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
    </div>
  </div>

  <div class="w-full max-w-4xl px-4 flex flex-col gap-10 pb-8">
    <div class="bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl">
      <h4
        class="text-[10px] font-black uppercase tracking-widest text-amber-500 mb-6 flex items-center gap-2"
      >
        <iconify-icon icon="fluent-emoji:label"></iconify-icon> Identité de base
      </h4>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter ml-1"
            >Nom du personnage</label
          >
          <input
            type="text"
            [ngModel]="c().name"
            (ngModelChange)="updateIdentity('name', $event)"
            placeholder="Ex: Valerius l'Audacieux"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all"
          />
        </div>
        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter ml-1"
            >Sexe</label
          >
          <select
            [ngModel]="c().sex"
            (ngModelChange)="updateIdentity('sex', $event)"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all cursor-pointer appearance-none"
          >
            <option value="X">Indéfini</option>
            <option value="M">Masculin</option>
            <option value="F">Féminin</option>
          </select>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter ml-1"
            >Alignement</label
          >
          <select
            [ngModel]="c().alignment"
            (ngModelChange)="updateIdentity('alignment', $event)"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all cursor-pointer appearance-none"
          >
            <option value="" disabled selected>Choisir un alignement...</option>
            @for (align of alignments; track align) {
              <option [value]="align">{{ align }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <div class="bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl">
      <h4
        class="text-[10px] font-black uppercase tracking-widest text-amber-500 mb-6 flex items-center gap-2"
      >
        <iconify-icon icon="fluent-emoji:bust-in-silhouette"></iconify-icon> Description Physique
      </h4>

      <div class="space-y-4">
        <textarea
          [ngModel]="c().description"
          (ngModelChange)="updateIdentity('description', $event)"
          rows="3"
          placeholder="Décrivez l'apparence de votre personnage (taille, yeux, signes distinctifs...)"
          class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-4 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none custom-scrollbar leading-relaxed"
        ></textarea>
      </div>
    </div>

    <div class="bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl">
      <h4
        class="text-[10px] font-black uppercase tracking-widest text-amber-500 mb-6 flex items-center gap-2"
      >
        <iconify-icon icon="fluent-emoji:brain"></iconify-icon> Traits & Idéaux
      </h4>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter ml-1"
            >Traits de personnalité</label
          >
          <textarea
            [ngModel]="c().traits"
            (ngModelChange)="updateIdentity('traits', $event)"
            rows="3"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none text-xs leading-relaxed"
          ></textarea>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter ml-1"
            >Idéal</label
          >
          <textarea
            [ngModel]="c().ideal"
            (ngModelChange)="updateIdentity('ideal', $event)"
            rows="3"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none text-xs leading-relaxed"
          ></textarea>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter ml-1"
            >Liens</label
          >
          <textarea
            [ngModel]="c().bonds"
            (ngModelChange)="updateIdentity('bonds', $event)"
            rows="3"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none text-xs leading-relaxed"
          ></textarea>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter ml-1"
            >Failles</label
          >
          <textarea
            [ngModel]="c().flaws"
            (ngModelChange)="updateIdentity('flaws', $event)"
            rows="3"
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none text-xs leading-relaxed"
          ></textarea>
        </div>
      </div>
    </div>

    <div class="bg-[#1b2028] p-6 sm:p-8 rounded-2xl border border-slate-800 shadow-xl">
      <div class="flex items-center justify-between mb-6">
        <h4
          class="text-[10px] font-black uppercase tracking-widest text-amber-500 flex items-center gap-2"
        >
          <iconify-icon icon="fluent-emoji:scroll"></iconify-icon> Histoire & Inspiration
        </h4>

        <button
          class="inline-flex items-center gap-2 px-4 py-2 bg-amber-500/10 border border-amber-500/30 rounded-lg text-amber-500 text-[10px] font-black uppercase tracking-widest hover:bg-amber-500/20 transition-all disabled:opacity-50"
          (click)="generateStory()"
          [disabled]="isGenerating() || !c().name.trim()"
        >
          @if (isGenerating()) {
            <span
              class="w-3 h-3 border-2 border-amber-500 border-t-transparent rounded-full animate-spin"
            ></span>
            Inspiration...
          } @else {
            <iconify-icon icon="fluent-emoji:sparkles"></iconify-icon> Générer avec l'IA
          }
        </button>
      </div>

      <div class="space-y-4">
        @if (generationError()) {
          <div
            class="p-3 bg-red-950/30 border border-red-900/50 rounded-xl text-[10px] text-red-400 flex items-center gap-2 animate-shake"
          >
            <iconify-icon icon="fluent-emoji:warning"></iconify-icon> {{ generationError() }}
          </div>
        }

        <div class="relative">
          <textarea
            [ngModel]="c().story"
            (ngModelChange)="updateIdentity('story', $event)"
            rows="8"
            placeholder="L'histoire de votre personnage... Laissez l'IA vous inspirer ou écrivez votre propre légende."
            class="w-full bg-[#171b22] border border-slate-700 rounded-xl px-4 py-4 text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all resize-none custom-scrollbar leading-relaxed"
          ></textarea>
        </div>
      </div>
    </div>

    <div class="mt-8 flex flex-col items-center gap-4 w-full">
      @if (!c().name.trim()) {
        <div
          class="px-6 py-2 bg-red-950/20 border border-red-900/50 rounded-full flex items-center gap-3"
        >
          <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
          <span class="text-[10px] font-black uppercase tracking-widest text-red-400/90"
            >Le nom est requis</span
          >
        </div>
      }

      <button
        class="px-14 py-4 rounded-xl text-sm font-black uppercase tracking-widest transition-all shadow-lg"
        [ngClass]="
          c().name.trim()
            ? 'bg-amber-500 text-slate-950 hover:bg-amber-400 hover:scale-105 shadow-[0_0_25px_rgba(245,158,11,0.3)]'
            : 'bg-slate-800 text-slate-500 opacity-50 cursor-not-allowed'
        "
        [disabled]="!c().name.trim()"
        (click)="confirm()"
      >
        Finaliser l'identité
      </button>

      <button
        class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-amber-400 transition-colors bg-[#1b2028] px-6 py-2 rounded-full border border-slate-700 mt-2"
        (click)="prevStep()"
      >
        ← Étape précédente
      </button>
    </div>
  </div>
</div>

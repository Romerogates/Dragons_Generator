<nav
  class="w-full bg-[#1b2028]/95 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50 shadow-xl"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <a routerLink="/" class="flex items-center gap-3 group">
        <img
          src="dragon_512x512.png"
          alt="Logo Dragons"
          class="h-8 w-8 object-contain drop-shadow-[0_0_8px_rgba(245,158,11,0.8)] group-hover:scale-110 transition-transform"
        />

        <span
          class="font-serif font-bold text-lg text-slate-100 group-hover:text-amber-500 transition-colors tracking-wide"
        >
          Dragons <span class="text-amber-600">Generator</span>
        </span>
      </a>

      <div class="hidden md:flex items-center gap-8 h-full">
        <a
          routerLink="/"
          routerLinkActive="text-amber-400 border-amber-500"
          [routerLinkActiveOptions]="{ exact: true }"
          class="h-full flex items-center text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 hover:text-amber-400 border-b-2 border-transparent transition-all px-1"
        >
        </a>
        <a
          routerLink="/create"
          routerLinkActive="text-amber-400 border-amber-500"
          class="h-full flex items-center text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 hover:text-amber-400 border-b-2 border-transparent transition-all px-1"
        >
          Forger un Héros
        </a>
        <a
          routerLink="/species"
          routerLinkActive="text-amber-400 border-amber-500"
          class="h-full flex items-center text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 hover:text-amber-400 border-b-2 border-transparent transition-all px-1"
        >
          Especes
        </a>
        <a
          routerLink="/classes"
          routerLinkActive="text-amber-400 border-amber-500"
          class="h-full flex items-center text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 hover:text-amber-400 border-b-2 border-transparent transition-all px-1"
        >
          Classes
        </a>
        <a
          routerLink="civilisations"
          routerLinkActive="text-amber-400 border-amber-500"
          class="h-full flex items-center text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 hover:text-amber-400 border-b-2 border-transparent transition-all px-1"
        >
          civilisations
        </a>
        <a
          routerLink="equipments"
          routerLinkActive="text-amber-400 border-amber-500"
          class="h-full flex items-center text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 hover:text-amber-400 border-b-2 border-transparent transition-all px-1"
        >
          Equipements
        </a>
        <a
          routerLink="spells"
          routerLinkActive="text-amber-400 border-amber-500"
          class="h-full flex items-center text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 hover:text-amber-400 border-b-2 border-transparent transition-all px-1"
        >
          Sortilèges
        </a>
      </div>

      <div class="flex items-center">
        <a
          routerLink="/characters"
          class="flex items-center gap-3 bg-[#171b22] border border-slate-700 hover:border-emerald-500/50 px-5 py-2.5 rounded-full shadow-inner group transition-all"
        >
          <span
            class="text-[10px] font-black uppercase tracking-widest text-slate-300 group-hover:text-emerald-400"
            >Mes Héros</span
          >
          @if (savedCount > 0) {
            <span
              class="bg-emerald-950 text-emerald-400 text-[10px] font-black px-2 py-0.5 rounded-full border border-emerald-900 shadow-sm"
              >{{ savedCount }}</span
            >
          }
        </a>
      </div>
    </div>
  </div>
</nav>

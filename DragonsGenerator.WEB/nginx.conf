# 1. Le videur : Redirection automatique de HTTP vers HTTPS
server {
    listen 80;
    server_name dragons-generator.top;

    # On renvoie tout le monde vers la même adresse, mais avec le cadenas vert
    return 301 https://$host$request_uri;
}

# 2. La zone sécurisée : Ton application
server {
    listen 443 ssl;
    server_name dragons-generator.top;

    # On indique à Nginx où trouver les certificats qu'on vient de générer
    ssl_certificate /etc/letsencrypt/live/dragons-generator.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dragons-generator.top/privkey.pem;

    # Quelques réglages de sécurité standards
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Routage Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy vers l'API
    location /api/ {
        proxy_pass http://dragons-api:8080/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'keep-alive';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

services:
  # --- BACKEND ---
  dragons-api:
    container_name: dragons-api
    build:
      context: ./DragonsGenerator.API
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
    networks:
      - dragons-network

  # --- FRONTEND ---
  dragons-web:
    container_name: dragons-web
    build:
      context: ./DragonsGenerator.WEB
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443" # NOUVEAU : On ouvre la porte pour le HTTPS
    volumes:
      # NOUVEAU : On donne à Nginx l'accès (en lecture seule 'ro') à tes nouveaux certificats
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - dragons-api
    networks:
      - dragons-network

networks:
  dragons-network:
    driver: bridge
